<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HomeOS v2</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HomeOS">
    <link rel="apple-touch-icon" href="/logo.png">
    <meta name="theme-color" content="#ffffff">
    <style>
      body { background: #ffffff; margin: 0; }
      #root:empty::after {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: 30px;
        height: 30px;
        margin: -15px 0 0 -15px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      #fallback {
        display: none;
        position: fixed;
        top: 60%;
        left: 0;
        right: 0;
        text-align: center;
        font-family: sans-serif;
        color: #64748b;
        font-size: 14px;
        padding: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="fallback">
      <p>Загрузка затянулась... 🤔</p>
      <button onclick="location.reload()" style="background:#6366f1; color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">Обновить страницу</button>
      <p style="font-size:10px; margin-top:10px;">Если не помогает, попробуйте открыть в браузере</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(() => {
        if (document.getElementById('root').innerHTML === "") {
          document.getElementById('fallback').style.display = "block";
        }
      }, 10000);
      
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
